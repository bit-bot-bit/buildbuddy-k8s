name: Chart Release Asset

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to upload the chart asset to
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          tag_name="$RELEASE_TAG"
          if [ -z "$tag_name" ]; then
            tag_name="$INPUT_TAG"
          fi
          if [ -z "$tag_name" ]; then
            echo "tag_name is required" >&2
            exit 1
          fi

          chart_version="${tag_name#buildbuddy-v}"
          if [ "$chart_version" = "$tag_name" ]; then
            echo "tag '$tag_name' does not match expected buildbuddy-v<semver> format" >&2
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag_name }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Apply release chart version
        run: .github/scripts/set-chart-version.sh "${{ steps.tag.outputs.chart_version }}"

      - name: Add chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build .

      - name: Lint chart
        run: helm lint .

      - name: Package chart
        run: |
          mkdir -p artifacts
          helm package . --destination artifacts

      - name: Upload chart asset to existing release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: artifacts/*.tgz
          fail_on_unmatched_files: true
