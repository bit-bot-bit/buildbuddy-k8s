{{- if .Values.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "buildbuddy.appEnvSecretName" . }}
  labels:
    {{- include "buildbuddy.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
type: Opaque
stringData:
  {{- range $key, $value := .Values.secretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- if .Values.executor.enabled }}
{{- if .Values.executor.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "buildbuddy.executorEnvSecretName" . }}
  labels:
    {{- include "buildbuddy.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
type: Opaque
stringData:
  {{- range $key, $value := .Values.executor.secretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
