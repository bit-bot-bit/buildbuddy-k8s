apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-headless" (include "buildbuddy.fullname" .) }}
  labels:
    {{- include "buildbuddy.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "buildbuddy.appSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: {{ .Values.service.httpPort }}
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort }}
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buildbuddy.fullname" . }}
  labels:
    {{- include "buildbuddy.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "buildbuddy.appSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.service.httpPort }}
      protocol: TCP
    - name: grpc
      port: 1985
      targetPort: {{ .Values.service.grpcPort }}
      protocol: TCP
